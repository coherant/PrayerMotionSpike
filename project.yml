name: SalahMotion
# Generated project — regenerate with `xcodegen generate` after editing this file.
# Migrated from the hand-managed .xcodeproj in the watch-core-extraction arc
# (docs/features/watch/REFACTOR-PLAN.md, Stage 1). Behavior-preserving: the iPhone
# app + SalahMotionTests must build and the golden snapshot stay green.

options:
  deploymentTarget:
    iOS: "26.5"
  createIntermediateGroups: true
  developmentLanguage: en
  groupSortPosition: top

settings:
  base:
    DEVELOPMENT_TEAM: UGGK9A63KZ
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Modern Swift settings from the Xcode 26 template (not in XcodeGen's presets) —
    # SWIFT_DEFAULT_ACTOR_ISOLATION is behaviorally significant, keep it.
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

packages:
  SwiftAA:
    url: https://github.com/onekiloparsec/SwiftAA
    exactVersion: 3.0.1

targets:

  SalahMotion:
    type: application
    platform: iOS
    sources:
      - path: SalahMotion
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: SwiftAA
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: Xienta.SalahMotion
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "SalahMotion uses your location to show local prayer times."
        INFOPLIST_KEY_NSMotionUsageDescription: "This app uses motion data from your AirPods to detect prayer positions and guide you through the prayer hands-free."
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  SalahMotionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SalahMotionTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: SalahMotion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xienta.SalahMotionTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SalahMotion.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/SalahMotion"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  SalahMotion:
    build:
      targets:
        SalahMotion: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SalahMotionTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
